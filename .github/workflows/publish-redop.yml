name: Publish redop

on:
  workflow_dispatch:
  push:
    tags:
      - "redop-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun ci

      - name: Test and build redop
        working-directory: packages/redop
        run: |
          bun run build

      - name: Publish redop
        working-directory: packages/redop
        run: bun publish --access public --tolerate-republish
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
